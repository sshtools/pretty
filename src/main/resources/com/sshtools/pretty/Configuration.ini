; Default Configuration

; --------------------------------
; User Interface
; --------------------------------
[ui]

; Dark user interface (everything but the terminal display itself)
dark-mode = AUTO

; Whether to mute all audio (such as terminal bell). Toggled by bell icon
mute = false

; Password mode. STORE to store in desktop wallet, SESSION to store in memory,
; or PROMPT to always prompt
password-mode = STORE

; --------------------------------
; Options for the terminal
; --------------------------------

[terminal]

; Shell. The command to use to provide the initial shell. This may either be the 
; name of a discovered shell or internal command, or the path of a custom command. 
;
; If it is a named shell, then any additional arguments will be append to the default arguments for
; that shell. 
;
; If it is a path, then any additional arguments will be passed exactly as is.
;
; If it not a path, nor a named shell, then the command must exist on the path, and again
; additional arguments will be passed as is.
;
; If blank, or 'native', the default local shell will be used and again
; additional arguments will be passed as is.  
;
shell = native 
 
; Terminal type
type = xterm-256color

; Cursor style
cursor-style = BLOCK

; Blinking cursor
cursor-blink = true

; Whether to enable scroll-back at all
scroll-back = true

; Scroll-back buffer size
buffer-size = 32768

; Show a scrollbar when needed. ON always show, OFF never show, 
; AUTO automatically show depending on if there is scrollback content
scroll-bar = AUTO

; Theme. Color theme to use for terminal. This may be any known theme name
theme = Material

; Comma separate list of fonts, defining the order they will be queried for glyphs. An 
; empty list means the default font order will be used.
;  
; fonts = "<font name 1>"[, "<font name 2">[, ......]] 
fonts =

; Default font size
font-size = 16

; Resize mode. Can be one of 'SCREEN', 'FONT' or 'NONE'
resize-strategy = SCREEN

; Default screen size.
screen-size = 80x40 

; Opacity (0-100)
opacity = 95 

; Background image. File path or URL. When blank, will come from the theme (if any)
background-image = 

; Background type. One of <empty>, NONE, CENTERED, FILL, SCALED, TILED. When
; blank, will come from theme (if any)
background-type = NONE

; Whether to enable the blink text attribute. 
blinking = true

; Where tabs are positioned. 'TOP', 'BOTTOM', 'LEFT' or 'RIGHT'
tabs = TOP

; How big of a border should there be between the terminal content and the edges
; of the window. Can either be a single value, or 4 comma separated values for
; top, right, bottom, left. If set to 'default', will be take from the theme
padding = default

; Optional features. Each feature may be enabled or disabled by default. 
; Being in one of the two below settings will override this.

enabled-features = 
disabled-features = 

; Whether to use a "Login Shell" on operating systems that support it.
; This will have a slightly different environment, as if the user was
; logging in remotely to a new session.
login-shell = false

; Only applicable to Windows, whether to use "Legacy Pty". The default of
; false indicates to use the modern "ConPTY" API.
legacy-pty = false

; Whether to enable ANSI color on Windows
windows-ansi-color = true

; Whether to keep the pty open until all output has been received
preserve-tty = false

; Whether the pty should use "Console Mode", which activates a separate
; error stream, and makes some other operating system specific adjustments
console = false

; Whether or not passwords should be stored, and if so, how. 
password-mode = STORE

; --------------------------------
; File Transfer Options. 
; 
; --------------------------------
[file-transfer]
notifications = true

; --------------------------------
; Status display is additional screen space that may be written to be the
; host. This feature was supported in the vt320 and above (a single line) 
; and is activated by the DECSASD sequence.
;
; Anything that can be done with the main display can be done with
; the status display;
;
; --------------------------------
[status]

; Whether to show status display. 
enabled = false  

; Height of status display
height = 2

[pricli]

; --------------------------------
; Options for the popup console
; --------------------------------

[pricli]

; Whether to enable scroll-back at all
scroll-back = true

; Scroll-back buffer size
buffer-size = 8000

; Alignment. Where the console popup will appear. Can be 'AUTO', 'TOP' or 'BOTTOM'
align = AUTO

; Height. How high the console popup will be. Can either be a whole number of lines
; >= 1 or a fraction of the window size. 
height = 0.75

; Theme. Name of theme to use for the console popup. When not provided, attached
; terminal theme will be used
theme = Gray on Black

; --------------------------------
; Debug
; --------------------------------

[debug]

; Whether to show full stack traces when errors occur in the console
verbose-exceptions = false

; --------------------------------
; Other
; --------------------------------

; Environment key / value pairs will be injected into the targets environment, i.e.
; the native console or SSH connection 
[environment]